# Publish @jhlagado/azm to npm when a GitHub Release is published.
#
# Repository secret (Settings → Secrets and variables → Actions):
#   NPM_TOKEN — npm granular access token with publish for @jhlagado/azm
#   (use "bypass 2FA" if your package requires 2FA for publish)
#
# Package → Publishing access: must allow token-based publish (e.g. option that
# permits a granular token with bypass 2FA), not "disallow tokens only".
#
# Prerequisite: bump `version` in package.json on main, merge, then create a
# Release whose tag matches the version (e.g. v0.2.3 for 0.2.3).

name: Publish npm

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Verify release tag matches package.json version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"
          PKG_VER=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json','utf8')).version)")
          if [[ "$TAG" != v"$PKG_VER" && "$TAG" != "$PKG_VER" ]]; then
            echo "::error::Release tag \"$TAG\" does not match package.json version \"$PKG_VER\"."
            echo "Expected tag \"v$PKG_VER\" (or \"$PKG_VER\") before publishing."
            exit 1
          fi
          echo "OK: tag $TAG matches package version $PKG_VER"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:all

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
