# fallow.toml - repo-local dead-code / duplication analysis config

entry = [
  "src/index.ts",
  "src/api-tooling.ts",
  "src/cli.ts",
  "test/**/*.test.ts",
  "test/types/**/*.ts",
  "scripts/**/*.mjs",
  "scripts/**/*.js",
]

ignorePatterns = [
  "dist/**",
  "coverage/**",
  ".tmp/**",
  "next/**",
]

[rules]
unused-files = "warn"
unused-exports = "warn"
unused-types = "warn"
unused-dependencies = "warn"

[duplicates]
mode = "mild"
minLines = 5
minTokens = 50
threshold = 0
